<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Video Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
        }
        .video-box {
            width: 90%;
            max-width: 700px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        video {
            width: 100%;
            display: block;
            outline: none;
        }
        /* Chrome/Edge se download button hatane ke liye */
        video::- internal-media-controls-download-button {
            display:none;
        }
        video::-webkit-media-controls-enclosure {
            overflow:hidden;
        }
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px); /* Download button ko screen se bahar dhakelne ke liye */
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Right click poori body par band -->

<div class="video-box">
    <!-- nodownload aur disablePictureInPicture se security badhti hai -->
    <video id="myVideo" 
           controls 
           controlsList="nodownload noremoteplayback" 
           disablePictureInPicture 
           oncontextmenu="return false;">
        
        <source src="/Assignment01ARTVedioLecture/VedioLec_ART.mp4" type="video/mp4">
        Aapka browser video support nahi karta.
    </video>
</div>

<script>
    // Right click ko video par block karne ka extra layer
    var video = document.getElementById('myVideo');
    video.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    }, false);

    // Keyboard shortcuts (jaise Ctrl+S) block karne ke liye
    document.onkeydown = function(e) {
        if (e.ctrlKey && (e.keyCode === 83 || e.keyCode === 85)) { // Ctrl+S aur Ctrl+U
            return false;
        }
    };
</script>

</body>
</html>
